.page-header {

}
.page-title::after {

    height: 4px;
    background: linear-gradient(90deg, #4a90e2, #6fb6f8);
    border-radius: 999px;

}

/* 工具列表 */
.tool-list{

    padding-top: 0.5rem;
}
.tool-item{
    background:rgba(255,255,255,0.85);

    padding:1.8rem 1.5rem;border-radius:16px;
    box-shadow:0 6px 16px rgba(0,0,0,0.05);
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:1.2rem;transition:0.3s;
    border:1px solid rgba(255,255,255,0.5);
}
.tool-item:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(74,144,226,0.1);
    background:#fff;
}
.tool-info{flex:1;min-width:260px}
.tool-name{
    font-weight:600;font-size:clamp(1.05rem, 2vw, 1.2rem); /* 统一工具名称字体 */
    color:#2d3748;margin-bottom:0.5rem;
}
.tool-desc{
    color:#718096;font-size:clamp(0.9rem, 1.5vw, 0.95rem); /* 统一工具描述字体 */
    line-height:1.5;
}
.download-btn{
    background:#4a90e2;color:#fff;border:none;
    padding:0.8rem 1.6rem;border-radius:10px;
    cursor:pointer;text-decoration:none;transition:0.25s;
    white-space:nowrap;font-weight:500;
    font-size: clamp(0.95rem, 1.5vw, 1.05rem); /* 统一按钮字体 */
}
.download-btn:hover{
    background:#357abd;transform:translateY(-2px);
}

footer{

    background:#2d3748;color:#fff;
    margin-top:4rem;
    font-size:clamp(0.85rem, 1.5vw, 0.95rem);

/* 移动端适配 - 统一字体缩放 */
@media (max-width:768px){
    .tool-item{padding:1.5rem 1.2rem}
    .download-btn{width:100%;text-align:center;padding:0.9rem 0}
    .page-header {margin-bottom: 2rem;}

}
@media (max-width:480px){
