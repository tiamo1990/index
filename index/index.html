<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人博客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background-color: #f8f9fa;
      color: #333;
      line-height: 1.7;
    }

    /* 导航栏 */
    nav {
      background: #2c3e50;
      color: white;
      padding: 15px 30px;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .nav-wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .menu a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* 头部 Banner */
    header {
      background: linear-gradient(to right, #42b983, #359477);
      color: white;
      text-align: center;
      padding: 70px 20px;
    }

    header h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    /* 内容容器 */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    /* 文章卡片 */
    .card-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-body {
      padding: 20px;
    }

    .date {
      color: #999;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 20px;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .intro {
      color: #666;
    }

    /* 页脚 */
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: 40px;
    }

    /* 响应式 */
    @media (min-width: 768px) {
      .card-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .card-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

<!-- 导航 -->
<nav>
  <div class="nav-wrap">
    <div class="logo">个人博客</div>
    <div class="menu">
      <a href="#">首页</a>
      <a href="#">文章</a>
      <a href="#">关于</a>
      <a href="#">留言</a>
    </div>
  </div>
</nav>

<!-- 头部 -->
<header>
  <h1>欢迎来到我的个人博客</h1>
  <p>记录生活、技术与思考</p>
</header>

<!-- 文章列表 -->
<div class="container">
  <h2 class="section-title">最新文章</h2>
  <div class="card-list">

    <div class="card">
      <img src="https://picsum.photos/id/24/400/250" alt="">
      <div class="card-body">
        <div class="date">2026-03-24</div>
        <h3 class="card-title">HTML 学习笔记</h3>
        <p class="intro">从零开始学习HTML，掌握常用标签、结构和语义化写法，快速搭建网页基础。</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/id/239/400/250" alt="">
      <div class="card-body">
        <div class="date">2026-03-23</div>
        <h3 class="card-title">CSS 布局技巧总结</h3>
        <p class="intro">Flex、Grid、居中、响应式布局，一篇文章掌握所有常用CSS布局方法。</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/id/160/400/250" alt="">
      <div class="card-body">
        <div class="date">2026-03-22</div>
        <h3 class="card-title">JavaScript 入门指南</h3>
        <p class="intro">学习变量、函数、DOM操作，让网页动起来，成为真正的前端开发者。</p>
      </div>
    </div>

  </div>
</div>

<!-- 页脚 -->
<footer>
  <p>&copy; 2026 我的个人博客 - 保留所有权利</p>
</footer>

</body>
</html>
