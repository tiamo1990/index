<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理 - 个人工具下载站</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 外部样式文件 -->
<link rel="stylesheet" href="styles.css">

<style>
/* 后台管理页面特有样式 */
.admin-container {
    min-height: 100vh;
}

.admin-header {
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    color: var(--text-primary);
    padding: 1rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
}

.admin-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
}

.admin-menu {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.admin-nav-item {
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.95rem;
    padding: 0.6rem 1.2rem;
    border-radius: 50px;
    transition: all 0.3s var(--ease-out-back);
}

.admin-nav-item:hover {
    background: rgba(99, 102, 241, 0.2);
    color: var(--text-primary);
}

.admin-nav-item.active {
    background: var(--primary-gradient);
    color: white;
}

.admin-content {
    padding: 2rem 0;
}

.admin-section {
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    padding: 1.5rem;
    margin-bottom: 2rem;
}

.admin-section h3 {
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    font-size: 1.25rem;
    font-weight: 600;
}

.admin-controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}

.filter-section, .search-section {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.filter-select, .search-input {
    padding: 0.5rem 0.75rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    font-size: 0.9rem;
    background: rgba(30, 30, 60, 0.8);
    color: #ffffff;
    transition: all 0.3s var(--ease-out-expo);
    min-width: 120px;
}

.filter-select option {
    background: #1a1a3e;
    color: #ffffff;
    padding: 0.5rem;
}

.filter-select:focus, .search-input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

.action-btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s var(--ease-out-back);
}

.action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.action-btn.primary {
    background: var(--primary-gradient);
    color: white;
}

.action-btn.secondary {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    border: 1px solid var(--glass-border);
}

.action-btn.danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
}

.resources-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1rem;
}

.resources-table th,
.resources-table td {
    padding: 0.75rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--glass-border);
    color: var(--text-primary);
}

.resources-table th {
    background: rgba(99, 102, 241, 0.1);
    font-weight: 600;
    color: var(--text-secondary);
}

.resources-table tr:hover {
    background: rgba(99, 102, 241, 0.05);
}

.resource-actions {
    display: flex;
    gap: 0.5rem;
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--glass-bg);
    color: var(--text-primary);
    transition: all 0.3s var(--ease-out-expo);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1.5rem;
}

.admin-message {
    padding: 1rem;
    border-radius: 12px;
    margin-bottom: 1rem;
    font-weight: 500;
}

.admin-message.success {
    background: rgba(16, 185, 129, 0.15);
    color: #10b981;
    border: 1px solid rgba(16, 185, 129, 0.3);
}

.admin-message.error {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
}

@media (max-width: 768px) {
    .admin-nav {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
    }
    
    .admin-menu {
        flex-wrap: wrap;
    }
    
    .admin-controls {
        flex-direction: column;
        align-items: flex-start;
    }
    
    .resources-table {
        font-size: 0.85rem;
    }
    
    .resources-table th,
    .resources-table td {
        padding: 0.5rem;
    }
}
</style>
</head>
<body>

<header class="admin-header">
    <div class="container">
        <div class="admin-nav">
            <div class="logo">📦 后台管理</div>
            <div class="admin-menu">
                <a href="#resources" class="admin-nav-item active">资源管理</a>
                <a href="#add" class="admin-nav-item">添加资源</a>
                <a href="javascript:logout()" class="admin-nav-item">退出登录</a>

        </div>
    </div>
</header>

<main class="admin-container">
    <div class="container">
        <div class="admin-content">
            <!-- 消息提示 -->
            <div id="adminMessage" class="admin-message" style="display: none;"></div>
            
            <!-- 资源管理 -->
            <section id="resources" class="admin-section">
                <h3>资源管理</h3>
                <div class="admin-controls">
                    <div class="filter-section">
                        <label for="resource-filter">筛选分类:</label>

                            <option value="dev">开发工具</option>
                            <option value="network">网络工具</option>

                    </div>
                    <div class="search-section">
                        <label for="resource-search">搜索资源:</label>

            <!-- 编辑资源 -->
            <section class="admin-section">
                <h3>编辑资源</h3>
                <form id="editForm">
                    <input type="hidden" id="resourceId">
                    <div class="form-group">
                        <label for="editToolName">工具名称:</label>
                        <input type="text" id="editToolName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">分类:</label>
                        <select id="editCategory" required>
                            <option value="system">系统工具</option>
                            <option value="office">办公工具</option>
                            <option value="dev">开发工具</option>

                            <option value="multimedia">多媒体工具</option>

                    </div>
                    <div class="form-group">
                        <label for="editDescription">描述:</label>
                        <textarea id="editDescription" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editDownloadLink">下载链接:</label>

                    </div>
                    <div class="form-actions">
                        <button type="submit" class="action-btn primary">更新资源</button>
                    </div>
                </form>
            </section>
            
            <!-- 添加资源 -->
            <section id="add" class="admin-section">
                <h3>添加资源</h3>
                <form id="addForm">
                    <div class="form-group">
                        <label for="addToolName">工具名称:</label>
                        <input type="text" id="addToolName" required>
                    </div>
                    <div class="form-group">
                        <label for="addCategory">分类:</label>
                        <select id="addCategory" required>
                            <option value="system">系统工具</option>
                            <option value="office">办公工具</option>
                            <option value="dev">开发工具</option>
                            <option value="network">网络工具</option>
                            <option value="multimedia">多媒体工具</option>
                            <option value="plugin">其他工具</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="addDescription">描述:</label>
                        <textarea id="addDescription" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="addDownloadLink">下载链接:</label>
                        <input type="url" id="addDownloadLink" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="action-btn primary">添加资源</button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-info">

<script>
// 从 localStorage 加载资源数据
var resources = [];

// 页面加载完成后初始化
window.onload = function() {
    // 检查登录状态
    if (localStorage.getItem('adminLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
    
    // 加载资源列表
    loadResources();
    
    // 编辑表单提交事件
    document.getElementById('editForm').addEventListener('submit', function(e) {
        e.preventDefault();
        updateResource();
    });
    
    // 添加资源表单提交事件
    document.getElementById('addForm').addEventListener('submit', function(e) {
        e.preventDefault();
        addResource();
    });
    
    // 生成静态文件按钮点击事件
    var generateBtn = document.querySelector('button[onclick="generateStaticFiles()"]');
    if (generateBtn) {
        generateBtn.addEventListener('click', function(e) {
            e.preventDefault();
            generateStaticFiles();
        });
    }
    
    // 分类筛选事件
    document.getElementById('resource-filter').addEventListener('change', function() {
        filterResources();
    });
    
    // 搜索事件
    document.getElementById('resource-search').addEventListener('input', function() {
        filterResources();
    });
};

// 加载资源列表
function loadResources() {
    // 从 localStorage 加载资源数据（与网站数据同步）
    var storedResources = localStorage.getItem('adminResources');

            { id: 6, name: 'office 2021', category: 'office', description: '微软官方办公套件，功能全面', downloadLink: 'https://pan.xunlei.com/s/VOMNOiB3GqkJZ56yXVoMds8UA1?pwd=vprd' },
            { id: 7, name: 'office 2019', category: 'office', description: '微软经典办公套件，稳定可靠', downloadLink: 'https://pan.xunlei.com/s/VOMNOlPRlZaV6altaliUQjxfA1?pwd=f8pv' },

            { id: 11, name: 'VirtualBox', category: 'dev', description: '免费虚拟机软件，支持多种操作系统虚拟化', downloadLink: 'https://download.virtualbox.org/virtualbox/5.2.44/VirtualBox-5.2.44-139111-Win.exe' },

        ];
        // 保存到 localStorage（保持与网站数据格式一致）
        saveResources();
    }
    
    // 渲染资源列表
    renderResources(resources);
}

// 渲染资源列表
function renderResources(resourcesToRender) {
    var tableBody = document.querySelector('#resourcesTable tbody');
    tableBody.innerHTML = '';
    
    for (var i = 0; i < resourcesToRender.length; i++) {
        var resource = resourcesToRender[i];
        var row = document.createElement('tr');
        var rowHtml = '<td>' + resource.id + '</td>';
        rowHtml = rowHtml + '<td>' + resource.name + '</td>';
        rowHtml = rowHtml + '<td>' + getCategoryName(resource.category) + '</td>';
        rowHtml = rowHtml + '<td>' + resource.description + '</td>';
        rowHtml = rowHtml + '<td><a href="' + resource.downloadLink + '" target="_blank">链接</a></td>';
        rowHtml = rowHtml + '<td>';
        rowHtml = rowHtml + '<div class="resource-actions">';
        rowHtml = rowHtml + '<button class="action-btn edit-btn" onclick="editResource(' + resource.id + ')">编辑</button>';
        rowHtml = rowHtml + '<button class="action-btn delete-btn" onclick="deleteResource(' + resource.id + ')">删除</button>';
        rowHtml = rowHtml + '</div>';
        rowHtml = rowHtml + '</td>';
        row.innerHTML = rowHtml;
        tableBody.appendChild(row);
    }
}

// 保存资源数据到 localStorage
function saveResources() {
    // 将数组格式转换为分类格式并保存
    var categoryData = {
        system: [],
        office: [],
        dev: [],
        network: [],
        multimedia: [],
        plugin: []
    };
    
    resources.forEach(function(item) {
        if (categoryData[item.category]) {
            categoryData[item.category].push({
                name: item.name,
                description: item.description,
                downloadLink: item.downloadLink
            });
        }
    });
    
    localStorage.setItem('adminResources', JSON.stringify(categoryData));
}

// 获取分类名称
function getCategoryName(category) {
    var categories = {
        system: '系统工具',
        office: '办公工具',
        dev: '开发工具',
        network: '网络工具',
        multimedia: '多媒体工具',
        plugin: '其他工具'
    };
    return categories[category] || category;
}

// 编辑资源
function editResource(id) {
    var resource = null;
    for (var i = 0; i < resources.length; i++) {
        if (resources[i].id === id) {
            resource = resources[i];
            break;
        }
    }
    if (resource) {
        document.getElementById('resourceId').value = resource.id;
        document.getElementById('editToolName').value = resource.name;
        document.getElementById('editCategory').value = resource.category;
        document.getElementById('editDescription').value = resource.description;
        document.getElementById('editDownloadLink').value = resource.downloadLink;
        
        // 滚动到编辑表单
        document.getElementById('editForm').scrollIntoView(true);
    }
}

// 更新资源
function updateResource() {
    var id = parseInt(document.getElementById('resourceId').value);
    var name = document.getElementById('editToolName').value;
    var category = document.getElementById('editCategory').value;
    var description = document.getElementById('editDescription').value;
    var downloadLink = document.getElementById('editDownloadLink').value;
    
    if (!id) {
        showMessage('请先选择要编辑的资源', 'error');
        return;
    }
    
    var index = -1;
    for (var i = 0; i < resources.length; i++) {
        if (resources[i].id === id) {
            index = i;
            break;
        }
    }
    
    if (index !== -1) {
        resources[index] = {
            id: id,
            name: name,
            category: category,
            description: description,
            downloadLink: downloadLink
        };
        
        // 保存到 localStorage
        saveResources();
        
        loadResources();
        showMessage('资源更新成功', 'success');
        
        // 清空编辑表单
        document.getElementById('editForm').reset();
        document.getElementById('resourceId').value = '';
    } else {
        showMessage('资源不存在', 'error');
    }
}

// 删除资源
function deleteResource(id) {
    if (confirm('确定要删除这个资源吗？')) {
        var newResources = [];
        for (var i = 0; i < resources.length; i++) {
            if (resources[i].id !== id) {
                newResources.push(resources[i]);
            }
        }
        resources = newResources;
        
        // 保存到 localStorage
        saveResources();
        
        loadResources();
        showMessage('资源删除成功', 'success');
    }
}

// 显示消息
function showMessage(message, type) {
    var messageElement = document.getElementById('adminMessage');
    messageElement.textContent = message;
    messageElement.className = 'admin-message ' + type;
    messageElement.style.display = 'block';
    
    // 3秒后自动隐藏

// 添加资源
function addResource() {
    var name = document.getElementById('addToolName').value;
    var category = document.getElementById('addCategory').value;
    var description = document.getElementById('addDescription').value;
    var downloadLink = document.getElementById('addDownloadLink').value;
    
    // 生成新的资源ID
    var newId = 1;
    if (resources.length > 0) {
        var maxId = 0;
        for (var i = 0; i < resources.length; i++) {
            if (resources[i].id > maxId) {
                maxId = resources[i].id;
            }
        }
        newId = maxId + 1;
    }
    
    // 创建新资源
    var newResource = {
        id: newId,
        name: name,
        category: category,
        description: description,
        downloadLink: downloadLink
    };
    
    // 添加到资源列表
    resources.push(newResource);
    
    // 保存到 localStorage
    saveResources();
    
    // 重新加载资源列表
    loadResources();
    
    // 显示成功消息
    showMessage('资源添加成功', 'success');
    
    // 清空添加表单
    document.getElementById('addForm').reset();
}

// 筛选资源
function filterResources() {
    var categoryFilter = document.getElementById('resource-filter').value;
    var searchTerm = document.getElementById('resource-search').value.toLowerCase();
    
    var filteredResources = [];
    
    // 按分类和搜索词筛选
    for (var i = 0; i < resources.length; i++) {
        var resource = resources[i];
        var matchCategory = (categoryFilter === 'all') || (resource.category === categoryFilter);
        var matchSearch = (!searchTerm) || 
                        (resource.name.toLowerCase().indexOf(searchTerm) !== -1) || 
                        (resource.description.toLowerCase().indexOf(searchTerm) !== -1);
        
        if (matchCategory && matchSearch) {
            filteredResources.push(resource);
        }
    }
    
    // 渲染筛选后的资源列表
    renderResources(filteredResources);
}

// 下载文件
function downloadHtmlFile(filename, content) {
    var blob = new Blob([content], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
