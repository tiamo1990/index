<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>实用插件 - 个人工具合集</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html { scroll-behavior: smooth; }

/* 与首页一致的极淡天蓝色渐变背景 */
body {
    background: linear-gradient(135deg, #fcfdff, #f9fcff);
    color:#333;line-height:1.6;min-height:100vh;
    opacity: 0;
    animation: pageFadeIn 0.6s ease forwards;
}
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* 头部 - 首页同款液态玻璃效果 */
header{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 15px rgba(150, 180, 255, 0.3);
    color:#2d3748;
    padding:1rem 0;
    position:sticky;top:0;z-index:100;
    border-radius: 0 0 12px 12px;
}
.container{width:95%;max-width:1100px;margin:0 auto;padding:0 10px}
.logo{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:8px}
main{padding:3rem 0;min-height:70vh}

/* 顶部模块（返回+标题）- 适配液态玻璃风格 */
.page-header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 2rem;
}
.back {
    display: inline-flex;align-items:center;gap:6px;
    color:#4285f4;
    font-weight:500;
    text-decoration:none;
    padding:0.5rem 1rem;
    border-radius:10px;
    /* 返回按钮液态玻璃效果 */
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 15px rgba(120, 160, 255, 0.2);
    transition:0.3s;
    margin-bottom: 1rem;
}
.back:hover{
    background: rgba(255,255,255,0.35);
    transform: translateX(-4px);
    box-shadow: 0 0 20px rgba(100, 140, 255, 0.3);
}

/* 标题样式 - 保持左对齐，渐变颜色与首页统一 */
.page-title {
    font-size: clamp(1.5rem, 4vw, 1.9rem);
    font-weight: 700;
    color: #2d3748;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 10px;
    position: relative;
}
.page-title::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, #8ab4f8, #4285f4);
    border-radius: 3px;
}

/* 工具列表 - 液态玻璃风格改造 */
.tool-list{
    display:flex;flex-direction:column;gap:1.5rem;
}
.tool-item{
    /* 核心液态玻璃效果 */
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 20px rgba(120, 160, 255, 0.25);
    padding:1.4rem 1.5rem;
    border-radius:20px; /* 大圆角贴合风格 */
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:1rem;
    transition:all 0.4s ease;
    position: relative;
    overflow: hidden;
}
/* 工具项添加流动光泽（和首页卡片一致） */
.tool-item::before {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: skewX(-15deg);
    transition: 0.6s;
}
.tool-item:hover{
    background: rgba(255,255,255,0.35);
    transform:translateY(-6px);
    box-shadow: 0 0 30px rgba(100, 140, 255, 0.4);
    border-color: rgba(255,255,255,0.9);
}
.tool-item:hover::before {
    left: 150%; /* 悬浮时光泽滑动 */
}
.tool-info{flex:1;min-width:240px;position: relative;}
.tool-name{
    font-weight:600;
    font-size:1rem;
    color:#2d3748;
    margin-bottom:0.3rem;
}
.tool-desc{
    color:#64748b;
    font-size:0.9rem;
    line-height:1.5;
}
.download-btn{
    /* 下载按钮渐变与首页统一 */
    background: linear-gradient(90deg, #8ab4f8, #4285f4);
    color:#fff;
    border:none;
    padding:0.7rem 1.2rem;
    border-radius:12px; /* 圆角贴合风格 */
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
    white-space:nowrap;
    font-weight:500;
    font-size:0.9rem;
    box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
    position: relative;
}
.download-btn:hover{
    transform:translateY(-2px);
    box-shadow: 0 6px 15px rgba(66, 133, 244, 0.4);
}

/* 底部 - 首页同款液态玻璃效果 */
footer{
    text-align:center;padding:2rem 0;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 15px rgba(150, 180, 255, 0.2);
    border-radius: 12px 12px 0 0;
    color:#475569;
    font-size:0.95rem;
    margin-top:4rem;
}

/* 回到顶部按钮（和首页一致） */
.back-to-top {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 15px rgba(120, 160, 255, 0.3);
    color: #4285f4;
    cursor: pointer;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 999;
}
.back-to-top:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(100, 140, 255, 0.4);
}

/* 移动端适配 */
@media (max-width:768px){
    .tool-item{
        flex-direction:column;
        align-items:stretch;
        text-align:left;
    }
    .download-btn{
        width:100%;
        text-align:center;
    }
    .tool-list{gap:1.2rem}
    main{padding:2rem 0}
}
@media (max-width:480px){
    .logo{font-size:1.3rem}
    .page-title {font-size: clamp(1.4rem, 3vw, 1.7rem);}
    .back-to-top {width: 45px;height: 45px;font-size: 1.1rem;}
}
</style>
</head>

<main class="container">

<div class="tool-list">

    </div>

<div class="tool-item">

</main>

<footer>
<div class="container">© 2026 个人工具下载站</div>
</footer>
</body>
</html>
