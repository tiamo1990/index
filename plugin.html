<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>实用插件 - 个人工具合集</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html { scroll-behavior: smooth; }

body {
    background: linear-gradient(135deg, #f0f4f8, #e6edf5);
    color:#333;line-height:1.6;min-height:100vh;
    opacity: 0;
    animation: pageFadeIn 0.6s ease forwards;
}
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

header{
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    color:#2d3748;padding:1rem 0;
    box-shadow:0 2px 15px rgba(0,0,0,0.05);
    position:sticky;top:0;z-index:100;
}
.container{width:95%;max-width:1100px;margin:0 auto;padding:0 10px}
.logo{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:8px}
main{padding:3rem 0;min-height:70vh}

.page-header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 2rem;
}
.back {
    display: inline-flex;align-items:center;gap:6px;
    color:#4a90e2;
    font-weight:500;
    text-decoration:none;
    padding:0.5rem 1rem;
    border-radius:10px;
    background:rgba(255,255,255,0.8);
    transition:0.3s;
    margin-bottom: 1rem;
}
.back:hover{
    background:#e6f0ff;
    transform: translateX(-4px);
}

.page-title {
    font-size: clamp(1.5rem, 4vw, 1.9rem);
    font-weight: 700;
    color: #2d3748;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 10px;
    position: relative;
}
.page-title::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, #4a90e2, #6fb6f8);
    border-radius: 3px;
}

.tool-list{
    display:flex;flex-direction:column;gap:1rem;
}
.tool-item{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    padding:1.4rem 1.5rem;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.04);
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:1rem;
    transition:all 0.3s cubic-bezier(0.25,1,0.5,1);
    border:1px solid rgba(255,255,255,0.3);
}
.tool-item:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 25px rgba(74,144,226,0.12);
    background:#fff;
}
.tool-info{flex:1;min-width:240px}
.tool-name{
    font-weight:600;
    font-size:1rem;
    color:#2d3748;
    margin-bottom:0.3rem;
}
.tool-desc{
    color:#718096;
    font-size:0.9rem;
}
.download-btn{
    background:#4a90e2;
    color:#fff;
    border:none;
    padding:0.7rem 1.2rem;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
    white-space:nowrap;
    font-weight:500;
    font-size:0.9rem;
}
.download-btn:hover{
    background:#357abd;
    transform:translateY(-2px);
}

footer{
    text-align:center;padding:2rem 0;
    color:#718096;
    font-size:0.9rem;
}

@media (max-width:768px){
    .tool-item{
        flex-direction:column;
        align-items:stretch;
        text-align:left;
    }
    .download-btn{
        width:100%;
        text-align:center;
    }
}
</style>
</head>
<body>

<header>
<div class="container">
<div class="logo">📦 个人工具合集</div>
</div>
</header>

<main class="container">
<div class="page-header">
    <a href="index.html" class="back">← 返回首页</a>
    <h1 class="page-title">🔌 实用插件</h1>
</div>

<div class="tool-list">
<div class="tool-item">
    <div class="tool-info">
        <div class="tool-name">油猴脚本 最新版</div>
        <div class="tool-desc">浏览器脚本管理器，解锁网页功能</div>
    </div>
    <a href="#" class="download-btn">立即下载</a>
</div>
<div class="tool-item">
    <div class="tool-info">
        <div class="tool-name">AdGuard 插件</div>
        <div class="tool-desc">广告拦截、隐私保护浏览器插件</div>
    </div>
    <a href="#" class="download-btn">立即下载</a>
</div>
<div class="tool-item">
    <div class="tool-info">
        <div class="tool-name">翻译插件 专业版</div>
        <div class="tool-desc">一键网页翻译，支持多语言互译</div>
    </div>
    <a href="#" class="download-btn">立即下载</a>
</div>
</div>
</main>

<footer>
<div class="container">© 2026 个人工具下载站</div>
</footer>
</body>
</html>
