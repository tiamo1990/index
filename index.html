<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人工具下载站</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html { scroll-behavior: smooth; }

/* 极淡天蓝色渐变背景 —— 接近白色，仅带一丝蓝调 */
body {
    background: linear-gradient(135deg, #fcfdff, #f9fcff);
    color:#333;line-height:1.6;min-height:100vh;
    opacity: 0;
    animation: pageFadeIn 0.6s ease forwards;
}
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* 头部 —— 参考图同款液态玻璃（通透+边框高亮） */
header{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 15px rgba(150, 180, 255, 0.3);
    color:#2d3748;
    padding:1rem 0;
    position:sticky;top:0;z-index:100;
    border-radius: 0 0 12px 12px; /* 底部圆角更贴合参考图 */
}
.container{width:95%;max-width:1100px;margin:0 auto;padding:0 10px}
.logo{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:8px}
main{padding:3rem 0;min-height:70vh}

.page-title {
    font-size: clamp(1.5rem, 4vw, 1.9rem);
    font-weight: 700;
    text-align: center;
    color: #2d3748;
    margin-bottom: 2rem;
    position: relative;
    letter-spacing: 0.5px;
    padding-bottom: 10px;
}
.page-title::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, #8ab4f8, #4285f4);
    border-radius: 3px;
}

/* 分类卡片 —— 参考图核心液态玻璃效果（通透+边框+光泽） */
.category-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:1.5rem;
    margin-top:0.5rem;
}
.card{
    /* 核心液态玻璃：半透+强模糊+高亮边框 */
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(25px) saturate(200%);
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 20px rgba(120, 160, 255, 0.25);
    border-radius:20px; /* 大圆角贴合参考图 */
    padding:2.5rem 2rem;
    text-align:center;
    transition:all 0.4s ease;
    text-decoration:none;
    color:#2d3748;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:200px;
    position: relative;
    overflow: hidden;
}
/* 卡片内加一层渐变光泽（参考图果冻感） */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: skewX(-15deg);
    transition: 0.6s;
}
.card:hover{
    background: rgba(255,255,255,0.35);
    transform:translateY(-6px);
    box-shadow: 0 0 30px rgba(100, 140, 255, 0.4);
    border-color: rgba(255,255,255,0.9);
}
.card:hover::before {
    left: 150%; /* 悬浮时光泽滑动，更有液态感 */
}
.card h3{
    margin:1rem 0;
    font-size: 1.3rem;
    font-weight:600;
    position: relative; /* 文字在光泽上层 */
}
.card p{
    font-size:0.95rem;
    color:#64748b;
    line-height:1.5;
    position: relative; /* 文字在光泽上层 */
}

/* 底部 —— 统一液态玻璃风格 */
footer{
    text-align:center;padding:2rem 0;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 15px rgba(150, 180, 255, 0.2);
    border-radius: 12px 12px 0 0; /* 顶部圆角贴合风格 */
    color:#475569;
    font-size:0.95rem;
    margin-top:4rem;
}
.footer-declare {
    max-width: 800px;
    margin: 0 auto 1rem;
    line-height: 1.8;
}
.footer-copyright {
    opacity: 0.8;
}

/* 弹窗 —— 更淡的液态玻璃效果 */
.modal {
    position: fixed;inset:0;
    background: rgba(0,0,0,0.15); /* 遮罩更淡 */
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;justify-content: center;
    z-index: 9999;
}
.modal.show {display: flex;}
.modal-box {
    background: rgba(255,255,255,0.18); /* 背景更淡更通透 */
    backdrop-filter: blur(30px) saturate(180%); /* 模糊更强，饱和度降低 */
    border: 1px solid rgba(255,255,255,0.5); /* 边框更淡 */
    box-shadow: 0 0 20px rgba(120, 160, 255, 0.15); /* 阴影更淡 */
    width:90%;max-width:380px;
    padding:2rem;border-radius:20px;
    text-align:center;animation:pop 0.4s ease;
    color:#2d3748; /* 文字颜色保持清晰 */
}
@keyframes pop{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-btn{
    padding:0.7rem 2rem;
    background: linear-gradient(90deg, #94bff9, #5a95f5); /* 按钮颜色稍淡 */
    color:#fff;
    border-radius:12px;
    font-size:0.9rem;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
    margin-top:1rem;
    border:none;
    box-shadow: 0 4px 10px rgba(66, 133, 244, 0.2); /* 按钮阴影更淡 */
}
.modal-btn:hover{
    transform:translateY(-2px);
    box-shadow: 0 6px 15px rgba(66, 133, 244, 0.25);
}

/* 回到顶部按钮 —— 同款液态玻璃 */
.back-to-top {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 15px rgba(120, 160, 255, 0.3);
    color: #4285f4;
    cursor: pointer;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 999;
}
.back-to-top:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(100, 140, 255, 0.4);
}

/* 移动端适配 */
@media (max-width:768px){
    .category-grid{gap:1.2rem}
    .card{padding:2rem 1.5rem;min-height:180px}
    main{padding:2rem 0}
    .page-title {margin-bottom: 1.8rem;}
}
@media (max-width:480px){
    .logo{font-size:1.3rem}
    .category-grid{grid-template-columns:1fr}
    .page-title {margin-bottom: 1.5rem;}
    .back-to-top {width: 45px;height: 45px;font-size: 1.1rem;}
}
</style>
</head>

<body>
<div class="modal" id="welcomeModal">
    <div class="modal-box">
        <h2>👋 欢迎访问本站</h2>
        <p>这里汇集了各类实用工具，安全、免费、好用！</p>
        <button class="modal-btn" onclick="closeModal()">确定</button>
    </div>
</div>

<header>
<div class="container">
<div class="logo">📦 个人工具合集</div>
</div>
</header>

<main class="container">
<h1 class="page-title">选择工具分类</h1>
<div class="category-grid">
<a href="system.html" class="card">
<h3>🖥️ 系统工具</h3>
<p>清理、优化、驱动、备份</p>
</a>
<a href="office.html" class="card">
<h3>📝 办公工具</h3>
<p>文档、表格、PDF、格式转换</p>
</a>
<a href="dev.html" class="card">
<h3>💻 专业开发工具</h3>
<p>网络工具，协议分析，ensp等</p>
</a>
<a href="plugin.html" class="card">
<h3>🔌 其他工具</h3>
<p>游戏插件、小脚本、快捷工具</p>
</a>
</div>
</main>

<footer>
<div class="container">
    <p class="footer-declare">本站大部分下载资源收集于网络，只做学习和交流使用，版权归原作者所有。若您需要使用非免费的软件或服务，请购买正版。如侵犯了您的权益，请联系站长删除，我们将及时处理。</p>
    <p class="footer-copyright">© 2026 个人工具下载站</p>
</div>
</footer>

<button class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
document.addEventListener('DOMContentLoaded',()=>{
    const modal = document.getElementById('welcomeModal');
    if(!document.referrer || !document.referrer.includes(window.location.hostname)) {
        setTimeout(() => {
            modal.classList.add('show');
        }, 500);
    }
});
function closeModal(){
    document.getElementById('welcomeModal').classList.remove('show');
}
window.addEventListener('scroll', () => {
    const backBtn = document.querySelector('.back-to-top');
    backBtn.style.opacity = window.scrollY > 300 ? '1' : '0.7';
});
</script>
</body>
</html>
