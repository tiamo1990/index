<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人工具下载站</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html { scroll-behavior: smooth; }

body {
    background: linear-gradient(135deg, #f0f4f8, #e2eaf0);
    color:#333;line-height:1.6;min-height:100vh;
    opacity: 0;
    animation: pageFadeIn 0.55s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
}
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}

header{
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    color:#2d3748;padding:1.2rem 0;
    box-shadow:0 2px 20px rgba(0,0,0,0.06);
    position:sticky;top:0;z-index:100;
}
.container{width:95%;max-width:1100px;margin:0 auto;padding:0 10px}
.logo{font-size:1.6rem;font-weight:700;display:flex;align-items:center;gap:8px}
main{padding:4rem 0;min-height:70vh}

/* 主页标题样式 */
.page-title {
    font-size: clamp(1.5rem, 3.2vw, 2rem);
    font-weight: 600;
    text-align: center;
    color: #2d3748;
    margin-bottom: 3rem;
    position: relative;
    letter-spacing: 0.5px;
    padding-bottom: 12px;
}
.page-title::after {
    content: "";
    display: block;
    width: 44px;
    height: 3px;
    background: linear-gradient(90deg, #4a90e2, #6fb6f8);
    border-radius: 999px;
    margin: 8px auto 0;
}

.category-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:2rem;
    margin-top:0.5rem;
}
.card{
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);
    border-radius:20px;padding:2.5rem 2rem;
    text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.06);
    transition:all 0.3s ease;text-decoration:none;
    color:#333;display:flex;flex-direction:column;
    align-items:center;justify-content:center;min-height:200px;
    border:1px solid rgba(255,255,255,0.5);
}
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(74,144,226,0.12);
    background:#fff;
}
.card h3{
    margin:1rem 0;color:#2d3748;
    font-size:clamp(1.2rem, 2vw, 1.4rem);
    font-weight:600;
}
.card p{
    font-size:clamp(0.95rem, 1.5vw, 1rem);
    color:#718096;line-height:1.5;
}
footer{
    text-align:center;padding:1.8rem 0;
    background:#2d3748;color:#fff;
    margin-top:4rem;
    font-size:clamp(0.85rem, 1.5vw, 0.95rem);
}

/* 欢迎弹窗 */
.modal {
    position: fixed;inset:0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;justify-content: center;
    z-index: 9999;
}
.modal.show {display: flex;}
.modal-box {
    background:#fff;width:90%;max-width:380px;
    padding:2.2rem 2rem;border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    text-align:center;animation:pop 0.4s ease;
}
@keyframes pop{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-btn{
    padding:0.75rem 2.5rem;background:#4a90e2;color:#fff;
    border:none;border-radius:12px;font-size:1rem;font-weight:500;
    cursor:pointer;transition:0.25s;
}
.modal-btn:hover{background:#357abd;transform:translateY(-2px);}

/* 移动端适配 */
@media (max-width:768px){
    .category-grid{gap:1.5rem}
    .card{padding:2rem 1.5rem;min-height:180px}
    main{padding:2rem 0}
    .page-title {margin-bottom: 2.5rem;}
}
@media (max-width:480px){
    .logo{font-size:1.3rem}
    .category-grid{grid-template-columns:1fr}
    .page-title {margin-bottom: 2rem;}
}
</style>
</head>

<body>
<div class="modal" id="welcomeModal">
    <div class="modal-box">
        <h2>👋 欢迎访问本站</h2>
        <p>这里汇集了各类实用工具，安全、免费、好用！</p>
        <button class="modal-btn" onclick="closeModal()">确定</button>
    </div>
</div>

<header>
<div class="container">
<div class="logo">📦 个人工具合集</div>
</div>
</header>

<main class="container">
<h1 class="page-title">选择工具分类</h1>
<div class="category-grid">
<a href="system.html" class="card">
<h3>🖥️ 系统工具</h3>
<p>清理、优化、驱动、备份</p>
</a>
<a href="office.html" class="card">
<h3>📝 办公工具</h3>
<p>文档、表格、PDF、格式转换</p>
</a>
<a href="dev.html" class="card">
<h3>💻 专业开发工具</h3>
<p>网络工具，协议分析，ensp等</p>
</a>
<a href="plugin.html" class="card">
<h3>🔌 实用插件</h3>
<p>浏览器插件、小脚本、快捷工具</p>
</a>
</div>
</main>

<footer>
<div class="container">© 2026 个人工具下载站</div>
</footer>

<script>
// 智能弹窗：仅首次访问显示
document.addEventListener('DOMContentLoaded',()=>{
    const modal = document.getElementById('welcomeModal');
    if(!document.referrer.includes(window.location.host)) {
        modal.classList.add('show');
    }
});
function closeModal(){
    document.getElementById('welcomeModal').classList.remove('show');
}
</script>
</body>
</html>
