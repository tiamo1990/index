<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>工具详情 - 个人工具下载站</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<style>
.image-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease-out;
}

.image-modal-overlay {
    position: absolute;
    inset: 0;
}

.image-modal-content {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    padding: 1rem;
}

.image-modal-content img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.image-modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.image-modal-close:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.1);
}

.screenshot-item {
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
}

.screenshot-item:hover .screenshot-overlay {
    opacity: 1;
}

.screenshot-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 8px;
}

.screenshot-overlay span {
    color: white;
    font-size: 0.9rem;
    font-weight: 500;
}

.no-screenshot {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
}

.no-screenshot-icon {
    font-size: 3rem;
    margin-bottom: 0.5rem;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>

<header id="mainHeader">
<div class="container">
    <div class="nav-container">
        <div class="logo">📦 个人工具<span>合集</span></div>
        
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">首页</a>
            <a href="system.html" class="nav-item">系统工具</a>
            <a href="office.html" class="nav-item">办公工具</a>
            <a href="dev.html" class="nav-item">开发工具</a>
            <a href="network.html" class="nav-item">网络工具</a>
            <a href="multimedia.html" class="nav-item">多媒体工具</a>
            <a href="plugin.html" class="nav-item">其他工具</a>
            <a href="login.html" class="nav-item">后台管理</a>
        </nav>
        
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" class="search-input" placeholder="搜索工具...">
        </div>
    </div>
</div>
</header>

<main class="container">
<div class="tool-detail-header">
    <a href="javascript:history.back()" class="back">← 返回上一页</a>
    <h1 class="tool-detail-title" id="toolTitle">加载中...</h1>
    
    <div class="tool-meta">
        <div class="meta-item">
            <div class="meta-label">分类</div>
            <div class="meta-value" id="toolCategory">-</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">版本</div>
            <div class="meta-value" id="toolVersion">-</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">文件大小</div>
            <div class="meta-value" id="toolSize">-</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">更新日期</div>
            <div class="meta-value" id="toolDate">-</div>
        </div>
    </div>
</div>

<div class="tool-content">
    <div class="tool-description">
        <h2>工具介绍</h2>
        <p id="toolDescription">加载中...</p>
        
        <h2>主要功能</h2>
        <ul id="toolFeatures"></ul>
        
        <h2>系统要求</h2>
        <p id="toolRequirements">-</p>
    </div>
    
    <div class="tool-sidebar">
        <div class="download-section">
            <a href="#" class="download-btn" id="downloadLink">立即下载</a>
            <div class="version-info">当前版本：<span id="downloadVersion">-</span></div>
            <div class="file-info">
                <div>文件类型：<span id="fileType">-</span></div>
                <div>文件大小：<span id="fileSize">-</span></div>
                <div>适用平台：<span id="platform">-</span></div>
            </div>
        </div>
        
        <div class="screenshot-section" id="screenshotSection">
            <h3>软件截图</h3>
            <div class="screenshot-gallery" id="screenshotGallery">
                <div class="no-screenshot">
                    <div class="no-screenshot-icon">📷</div>
                    <p>暂无截图</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="related-tools">
    <h2>相关工具</h2>
    <div class="related-tools-grid" id="relatedTools"></div>
</div>
</main>

<footer>
<div class="container">© 2026 个人工具下载站</div>
</footer>

<button class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script src="script.js"></script>

<script src="tool-detail-data.js"></script>
<script>
function loadToolDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const toolId = urlParams.get('tool') || 'winrar';
    
    let toolData = null;
    
    // 首先尝试从TOOL_DATA获取
    if (TOOL_DATA[toolId]) {
        toolData = { ...TOOL_DATA[toolId] };
    }
    
    // 从localStorage的adminResources中查找
    try {
        const savedResources = localStorage.getItem('adminResources');
        if (savedResources) {
            const resources = JSON.parse(savedResources);
            for (const category of Object.keys(resources)) {
                const resourceList = resources[category];
                for (let i = 0; i < resourceList.length; i++) {
                    const resource = resourceList[i];
                    // 生成资源ID进行匹配
                    const resourceId = resource.name.toLowerCase().replace(/[\s【】（）]/g, '');
                    if (resourceId === toolId) {
                        if (!toolData) {
                            // 如果TOOL_DATA中没有，使用adminResources中的数据
                            toolData = {
                                title: resource.name,
                                category: category,
                                version: resource.version || '',
                                size: resource.size || '',
                                date: resource.date || '',
                                description: resource.description || '',
                                downloadLink: resource.downloadLink || '#',
                                downloadVersion: resource.version || '',
                                fileType: 'EXE 安装包',
                                fileSize: resource.size || '',
                                platform: resource.platform || 'Windows',
                                screenshots: resource.screenshots || [],
                                features: [],
                                relatedTools: []
                            };
                        } else {
                            // 合并screenshots
                            toolData.screenshots = resource.screenshots || [];
                        }
                        break;
                    }
                }
                if (toolData && toolData.title !== '未知工具') break;
            }
        }
    } catch (e) {
        console.log('Failed to load from localStorage');
    }
    
    // 如果都没有找到，显示错误信息
    if (!toolData) {
        document.getElementById('toolTitle').textContent = '未找到工具';
        document.getElementById('toolDescription').textContent = '抱歉，未找到该工具的详细信息。请返回上一页重试。';
        document.getElementById('downloadLink').style.display = 'none';
        return;
    }
    
    // 更新页面内容
    document.getElementById('toolTitle').textContent = toolData.title || '未知工具';
    document.getElementById('toolCategory').textContent = toolData.category || '';
    document.getElementById('toolVersion').textContent = toolData.version || '';
    document.getElementById('toolSize').textContent = toolData.size || '';
    document.getElementById('toolDate').textContent = toolData.date || '';
    document.getElementById('toolDescription').textContent = toolData.description || '';
    document.getElementById('toolRequirements').textContent = toolData.requirements || '';
    document.getElementById('downloadLink').setAttribute('href', toolData.downloadLink || '#');
    document.getElementById('downloadVersion').textContent = toolData.downloadVersion || '';
    document.getElementById('fileType').textContent = toolData.fileType || '';
    document.getElementById('fileSize').textContent = toolData.fileSize || '';
    document.getElementById('platform').textContent = toolData.platform || '';
    
    if (toolData.features && toolData.features.length > 0) {
        document.getElementById('toolFeatures').innerHTML = toolData.features.map(f => '<li>' + f + '</li>').join('');
    }
    
    if (toolData.relatedTools && toolData.relatedTools.length > 0) {
        document.getElementById('relatedTools').innerHTML = toolData.relatedTools.map(t => `
            <a href="${t.url}" class="related-tool-item">
                <h3>${t.name}</h3>
                <p>${t.desc}</p>
            </a>
        `).join('');
    }
    
    renderScreenshots(toolData.screenshots || []);
}

function renderScreenshots(screenshots) {
    const screenshotGallery = document.getElementById('screenshotGallery');
    
    if (!screenshotGallery) return;
    
    if (!screenshots || screenshots.length === 0) {
        screenshotGallery.innerHTML = `
            <div class="no-screenshot">
                <div class="no-screenshot-icon">📷</div>
                <p>暂无截图</p>
            </div>
        `;
        return;
    }
    
    screenshotGallery.innerHTML = screenshots.map((img, idx) => `
        <div class="screenshot-item" onclick="openImageModal('${img}')">
            <img src="${img}" alt="截图${idx + 1}">
            <div class="screenshot-overlay">
                <span>点击查看大图</span>
            </div>
        </div>
    `).join('');
}

function openImageModal(src) {
    const modal = document.createElement('div');
    modal.className = 'image-modal';
    modal.innerHTML = `
        <div class="image-modal-overlay" onclick="closeImageModal()"></div>
        <div class="image-modal-content">
            <img src="${src}" alt="截图">
            <button class="image-modal-close" onclick="closeImageModal()">×</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';
}

function closeImageModal() {
    const modal = document.querySelector('.image-modal');
    if (modal) {
        modal.remove();
        document.body.style.overflow = '';
    }
}

document.addEventListener('DOMContentLoaded', loadToolDetails);
</script>
</body>
</html>
