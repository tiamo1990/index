.page-title::after {

/* 工具列表 */
.tool-list{

.tool-item{

}
.tool-item:hover{

.tool-info{flex:1;min-width:260px}
.tool-name{

.tool-desc{

.download-btn{

.download-btn:hover{

footer{

/* 移动端适配 - 统一字体缩放 */
@media (max-width:768px){

@media (max-width:480px){
